name: Nightly LoC Collection

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run line counter script
        run: |
          python loc_collector.py . --output metrics.csv

      - name: Commit and push if changes exist
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [ -f metrics.csv ]; then
            git add metrics.csv
            git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update nightly LoC metrics [skip ci]" && git push)
          else
            echo "No metrics file generated."
          fi
